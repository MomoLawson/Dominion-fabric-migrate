flags:
  animal_spawn:
    display-name: 動物のスポーン（繁殖）
    description: 動物のスポーンを許可するかどうか（スポーンエッグと繁殖を含む）。
  animal_move:
    display-name: 動物の移動
    description: 領地内で動物の移動を許可するかどうか。
  villager_spawn:
    display-name: 村人の繁殖
    description: 村人の繁殖を許可するかどうか（スポーンエッグを含む）。
  monster_spawn:
    display-name: モンスターのスポーン
    description: モンスターのスポーンを許可するかどうか（スポーンエッグを含む）。
  monster_move:
    display-name: モンスターの移動
    description: 領地内でモンスターの移動を許可するかどうか。
  monster_damage:
    display-name: モンスターのプレイヤー攻撃
    description: モンスターがプレイヤーにダメージを与えられるかどうか。
  ender_man:
    display-name: エンダーマン
    description: 無効にすると、エンダーマンのブロック持ち去り、スポーン、テレポートを防ぎます。
  tnt_explode:
    display-name: TNT爆発
    description: TNT の爆発を許可するかどうか。
  wither_spawn:
    display-name: ウィザーのスポーン
    description: ウィザーの召喚とウィザーによる爆発を許可するかどうか。
  creeper_explode:
    display-name: エンティティ爆発（TNT以外）
    description: クリーパー、ウィザースカル、エンドクリスタル、火の玉、ベッド、リスポーンアンカーなど。
  dragon_break_block:
    display-name: エンダードラゴンのブロック破壊
    description: エンダードラゴンがブロックを破壊できるかどうか。
  fire_spread:
    display-name: 火の延焼
    description: 領地内での火の延焼を防ぎます。
  burn_block:
    display-name: ブロックの燃焼
    description: ブロックが燃えることを許可するかどうか。
  burn_entity:
    display-name: エンティティの燃焼
    description: エンティティが燃える、または高温ダメージを受けることを許可するかどうか（プレイヤーを除く）。
  flow_in_protection:
    display-name: 液体の流入
    description: 外部からの水や溶岩が領地内へ流れ込むのを防ぎます。
  gravity_block:
    display-name: 落下ブロック
    description: 領地内で重力ブロックの落下を許可するかどうか（無効にするとアイテム化します）。
  ice_melt:
    display-name: 氷の融解
    description: 氷が溶けることを許可するかどうか。
  ice_form:
    display-name: 氷の生成
    description: 氷の生成を許可するかどうか（氷渡りを防止します）。
  snow_accumulation:
    display-name: 雪の堆積
    description: 雪が積もることを許可するかどうか。
  snow_melt:
    display-name: 雪の融解
    description: 雪が溶けることを許可するかどうか。
  trample:
    display-name: 耕地の踏み荒らし
    description: 耕地が踏み荒らされることを許可するかどうか（無効で耕地を保護）。
  decay:
    display-name: 葉の自然消滅
    description: 葉が自然消滅することを許可するかどうか。
  hopper_outside:
    display-name: ホッパー（外部）
    description: 無効にすると、外部ホッパーが領地内コンテナからアイテムを吸い出すのを防ぎます。
  piston_outside:
    display-name: ピストン
    description: 無効にすると、ピストンが領地をまたいでブロックを押したり引いたりするのを防ぎます。
  trig_pressure_proj:
    display-name: 感圧板（飛び道具）
    description: 飛び道具（矢、雪玉）が感圧板を作動させられるかどうか。
  trig_pressure_mob:
    display-name: 感圧板（モブ）
    description: モブ（プレイヤーを除く）が感圧板を作動させられるかどうか。
  trig_pressure_drop:
    display-name: 感圧板（ドロップ）
    description: 落ちているアイテムが感圧板を作動させられるかどうか。
  item_frame_proj_damage:
    display-name: 飛び道具による額縁破壊
    description: 飛び道具（矢、雪玉）が額縁を破壊できるかどうか。
  mob_drop_item:
    display-name: モブのアイテムドロップ
    description: モブが倒されたときにアイテムをドロップするかどうか。
  show_border:
    display-name: 境界を表示
    description: プレイヤーが入ったときに領地の境界を表示します。
  admin:
    display-name: 管理者
    description: このフラグを持つメンバーは通常メンバーとグループを管理できます。
  move:
    display-name: プレイヤー移動
    description: プレイヤーが領地内で移動できるかどうか。
  teleport:
    display-name: テレポート
    description: 無効にすると、この領地へテレポートできません。
  fly:
    display-name: 飛行
    description: エリトラ飛行ではなく、クリエイティブモードの飛行のようなものです。
  riding:
    display-name: 騎乗
    description: 乗り物（ボート、トロッコ、馬など）に乗れるかどうか。
  ender_pearl:
    display-name: エンダーパール
    description: エンダーパールを投げられるかどうか。
  raid:
    display-name: 襲撃
    description: 襲撃を発生させられるかどうか。
  place:
    display-name: ブロック設置
    description: ブロックを設置できるかどうか（通常ブロック、額縁、溶岩、水などを含む）。
  break:
    display-name: ブロック破壊
    description: ブロックを破壊できるかどうか（額縁や防具立てを含む）。
  ignite:
    display-name: 着火
    description: 火をつけられるかどうか。
  pick_up:
    display-name: アイテム拾得
    description: プレイヤーが領地内でアイテムを拾えるかどうか。
  drop_item:
    display-name: アイテム投棄
    description: プレイヤーが領地内でアイテムを捨てられるかどうか。
  door:
    display-name: ドア
    description: ドアと相互作用できるかどうか（トラップドア、フェンスゲートを含む）。
  button:
    display-name: ボタン
    description: ボタンを押せるかどうか。
  lever:
    display-name: レバー
    description: レバーを切り替えられるかどうか。
  pressure:
    display-name: 感圧板（プレイヤー）
    description: プレイヤーが感圧板を作動させられるかどうか。
  repeater:
    display-name: リピーター
    description: リピーターを変更（操作）できるかどうか。
  comparer:
    display-name: コンパレーター
    description: コンパレーターと相互作用できるかどうか。
  note_block:
    display-name: 音符ブロック
    description: 音符ブロックと相互作用できるかどうか。
  container:
    display-name: 特殊コンテナ
    description: '例: ホッパー、かまど、ドロッパー、ディスペンサー、高炉、燻製器。'
  hopper:
    display-name: 特殊コンテナ
    description: '例: ホッパー、かまど、ドロッパー、ディスペンサー、高炉、燻製器。'
  craft:
    display-name: 作業台
    description: 作業台を使用できるかどうか。
  crafter:
    display-name: クラフター
    description: クラフターと相互作用できるかどうか（1.21）。
  anvil:
    display-name: 金床
    description: 金床を使用できるかどうか。
  enchant:
    display-name: エンチャントテーブル
    description: エンチャントテーブルを使用できるかどうか。
  brew:
    display-name: 醸造台
    description: 醸造台を使用できるかどうか。
  beacon:
    display-name: ビーコン
    description: ビーコンと相互作用できるかどうか。
  jukebox:
    display-name: ジュークボックス
    description: ジュークボックスと相互作用できるかどうか。
  lectern:
    display-name: 書見台
    description: 書見台と相互作用できるかどうか。
  bookshelf:
    display-name: 模様入りの本棚
    description: 模様入りの本棚と相互作用できるかどうか。
  dragon_egg:
    display-name: ドラゴンの卵
    description: ドラゴンの卵と相互作用できるかどうか。
  item_frame_interactive:
    display-name: 額縁の操作
    description: 額縁と相互作用できるかどうか（アイテムの回転）。
  edit_sign:
    display-name: 看板編集
    description: 看板を編集できるかどうか。
  bed:
    display-name: ベッド
    description: ベッドで眠れるかどうか（リスポーン地点の設定）。
  anchor:
    display-name: リスポーンアンカー
    description: リスポーンアンカーを設定・使用できるかどうか。
  vehicle_spawn:
    display-name: 乗り物の設置
    description: 乗り物（ボート、トロッコ）を設置できるかどうか。
  vehicle_destroy:
    display-name: 乗り物の破壊
    description: 乗り物（ボート、トロッコ）を破壊できるかどうか。
  harvest:
    display-name: 収穫
    description: プレイヤーが作物を収穫できるかどうか。
  sowing:
    display-name: 種まき
    description: 作物（小麦、ニンジンなど）の植え付けを許可するかどうか。
  feed:
    display-name: 動物への餌やり
    description: 動物に餌を与えられるかどうか。
  shear:
    display-name: 毛刈り
    description: 羊から羊毛を刈り取れるかどうか。
  leash:
    display-name: リード
    description: 動物・モブ・エンティティにリードを付けられるかどうか。
  dye:
    display-name: 染色
    description: 染色できるもの（羊、犬の首輪、猫の首輪）。
  honey:
    display-name: ハチミツ
    description: ハチの巣と相互作用できるかどうか（ハチミツ採取）。
  cake:
    display-name: ケーキ
    description: ケーキを食べられるかどうか。
  trade:
    display-name: 村人取引
    description: 村人と取引できるかどうか。
  shoot:
    display-name: 射撃
    description: 矢、雪玉、トライデント、火の玉、ウィンドチャージ（1.21）を含みます。
  egg:
    display-name: 卵投げ
    description: 卵を投げられるかどうか。
  hook:
    display-name: 釣り竿
    description: 釣り竿を使用できるかどうか。
  pvp:
    display-name: PVP
    description: プレイヤー同士のダメージ。
  monster_killing:
    display-name: モンスター攻撃
    description: モンスターにダメージを与えられるかどうか。
  animal_killing:
    display-name: 動物攻撃
    description: 動物にダメージを与えられるかどうか。
  villager_killing:
    display-name: 村人攻撃
    description: 村人にダメージを与えられるかどうか。
  glow:
    display-name: 発光
    description: 発光の矢のような効果です。
